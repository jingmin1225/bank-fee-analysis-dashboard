<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAM Documentation Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f5f5f3;
  --color-background-tertiary:#eeece6;
  --color-text-primary:#1a1a18;
  --color-text-secondary:#5f5e5a;
  --color-text-tertiary:#9a9994;
  --color-border-tertiary:rgba(0,0,0,0.10);
  --color-border-secondary:rgba(0,0,0,0.18);
  --color-border-primary:rgba(0,0,0,0.26);
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'SF Mono','Fira Code',monospace;
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --border-radius-xl:16px;
}
@media (prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1c1c1a;
    --color-background-secondary:#252522;
    --color-background-tertiary:#1a1a18;
    --color-text-primary:#f0ede6;
    --color-text-secondary:#a8a59e;
    --color-text-tertiary:#6b6864;
    --color-border-tertiary:rgba(255,255,255,0.08);
    --color-border-secondary:rgba(255,255,255,0.14);
    --color-border-primary:rgba(255,255,255,0.22);
  }
}
body{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary);background:var(--color-background-tertiary);height:100vh;overflow:hidden}

/* ── Layout ── */
.layout{display:flex;height:100vh}
.sidebar{width:220px;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── Sidebar ── */
.sidebar-logo{padding:16px 18px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-mark{width:28px;height:28px;background:#185FA5;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:600;letter-spacing:-0.5px;flex-shrink:0}
.logo-text{font-size:13px;font-weight:500;line-height:1.2}
.logo-sub{font-size:10px;color:var(--color-text-secondary)}
.sidebar-section{padding:10px 10px 4px;font-size:10px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 12px;margin:1px 6px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--color-text-secondary);transition:background 0.1s,color 0.1s;user-select:none}
.nav-item:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-item.active{background:#E6F1FB;color:#185FA5;font-weight:500}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:0.7}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{margin-left:auto;background:#E24B4A;color:#fff;font-size:10px;padding:1px 5px;border-radius:10px;font-weight:500}

/* ── Topbar ── */
.topbar{height:52px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:500;flex:1}
.topbar-actions{display:flex;align-items:center;gap:8px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border:0.5px solid var(--color-border-secondary);border-radius:6px;font-size:13px;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans);transition:background 0.1s;white-space:nowrap;user-select:none;text-decoration:none}
.btn:hover{background:var(--color-background-secondary)}
.btn:active{transform:scale(0.98)}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C}
.btn-danger{background:#E24B4A;color:#fff;border-color:#E24B4A}
.btn-danger:hover{background:#A32D2D}
.btn-sm{padding:3px 8px;font-size:11px}

/* ── Content ── */
.content{flex:1;overflow:auto;padding:20px}

/* ── Filter bar ── */
.filter-bar{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{font-family:var(--font-sans);font-size:13px;padding:5px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:#185FA5}
.filter-bar input{flex:1;min-width:180px}
.filter-label{font-size:12px;color:var(--color-text-secondary);white-space:nowrap}

/* ── Table ── */
.table-wrap{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;overflow:hidden}
.table-toolbar{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap;min-height:44px}
.batch-info{font-size:13px;color:var(--color-text-secondary)}
.batch-info strong{color:var(--color-text-primary)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
th{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-align:left;padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);white-space:nowrap;user-select:none}
th.sortable{cursor:pointer}
th.sortable:hover{color:var(--color-text-primary)}
th.sort-asc::after{content:" ↑";color:#185FA5}
th.sort-desc::after{content:" ↓";color:#185FA5}
td{font-size:13px;padding:9px 14px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.selected td{background:#E6F1FB}
@media (prefers-color-scheme:dark){tr.selected td{background:#0C447C33}}
tr:not(.selected):hover td{background:var(--color-background-secondary)}
.cb{width:15px;height:15px;cursor:pointer;accent-color:#185FA5}
code{font-family:var(--font-mono);font-size:11px;background:var(--color-background-secondary);padding:1px 5px;border-radius:3px}

/* ── Inline row actions ── */
.actions-cell{display:flex;align-items:center;gap:4px;opacity:0;transition:opacity 0.1s}
tr:hover .actions-cell{opacity:1}
.icon-btn{width:26px;height:26px;border:0.5px solid var(--color-border-tertiary);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);font-size:12px;transition:background 0.1s,color 0.1s;flex-shrink:0}
.icon-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.icon-btn.delete:hover{background:#FCEBEB;color:#A32D2D;border-color:#F0959533}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-blue{background:#E6F1FB;color:#185FA5}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-gray{background:#F1EFE8;color:#5F5E5A}
.badge-purple{background:#EEEDFE;color:#534AB7}
.badge-teal{background:#E1F5EE;color:#0F6E56}
@media (prefers-color-scheme:dark){
  .badge-blue{background:#042C53;color:#85B7EB}
  .badge-green{background:#173404;color:#97C459}
  .badge-amber{background:#412402;color:#EF9F27}
  .badge-red{background:#501313;color:#F09595}
  .badge-gray{background:#2C2C2A;color:#B4B2A9}
  .badge-purple{background:#26215C;color:#AFA9EC}
  .badge-teal{background:#04342C;color:#5DCAA5}
}

/* ── Status dot ── */
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.dot-green{background:#639922}
.dot-amber{background:#BA7517}
.dot-red{background:#E24B4A}
.dot-gray{background:#888780}

/* ── Pagination ── */
.pager{display:flex;align-items:center;gap:6px;padding:10px 14px;border-top:0.5px solid var(--color-border-tertiary);justify-content:space-between}
.pager-info{font-size:12px;color:var(--color-text-secondary)}
.pager-btns{display:flex;gap:4px}
.pager-btn{width:28px;height:28px;border:0.5px solid var(--color-border-tertiary);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;background:var(--color-background-primary);color:var(--color-text-secondary);user-select:none}
.pager-btn:hover{background:var(--color-background-secondary)}
.pager-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}

/* ── Stats ── */
.stat-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:var(--color-background-secondary);border-radius:8px;padding:12px 14px}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500}
.stat-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}

/* ── Context menu ── */
.ctx-menu{position:fixed;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:4px;z-index:9999;min-width:188px;display:none;box-shadow:0 4px 24px rgba(0,0,0,0.13)}
.ctx-menu.visible{display:block}
.ctx-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;font-size:13px;cursor:pointer;color:var(--color-text-primary);user-select:none;transition:background 0.1s}
.ctx-item:hover{background:var(--color-background-secondary)}
.ctx-item.danger{color:#A32D2D}
.ctx-item.danger:hover{background:#FCEBEB}
.ctx-sep{height:0.5px;background:var(--color-border-tertiary);margin:3px 6px}
.ctx-icon{width:16px;text-align:center;font-size:13px;flex-shrink:0}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.36);display:none;align-items:center;justify-content:center;z-index:10000}
.modal-overlay.visible{display:flex}
.modal{background:var(--color-background-primary);border-radius:10px;border:0.5px solid var(--color-border-secondary);padding:24px;max-width:500px;width:92%;max-height:85vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:500;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:20px}
.form-row{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:5px;display:block}
.form-input{width:100%;font-family:var(--font-sans);font-size:13px;padding:7px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-primary);outline:none}
.form-input:focus{border-color:#185FA5}
textarea.form-input{resize:vertical;min-height:70px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:0.5px solid var(--color-border-tertiary)}

/* ── Toggle ── */
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:var(--color-border-secondary);border-radius:20px;cursor:pointer;transition:0.2s}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.2s}
.toggle input:checked+.toggle-slider{background:#185FA5}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px)}
.toggle-row{display:flex;align-items:center;gap:10px}
.toggle-label{font-size:13px}

/* ── Toast ── */
.toast{position:fixed;bottom:20px;right:20px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:10px 16px;font-size:13px;display:flex;align-items:center;gap:8px;z-index:99999;box-shadow:0 2px 12px rgba(0,0,0,0.1);opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none;transform:translateY(6px)}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>

  <!-- Main -->

<!-- Edit / Add modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event,'modal-overlay')">

</div>

<!-- Confirm delete modal -->
<div class="modal-overlay" id="confirm-overlay" onclick="handleOverlayClick(event,'confirm-overlay')">

</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span id="toast-icon"></span>
  <span id="toast-msg"></span>

function showPage(page) {
  currentPage = page;
  selectedRows.clear();
  sortCol = null;
  searchTerm = '';
  filterStatus = 'all';

  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === page);
  });
  document.getElementById('page-title').textContent = pages[page].title;
  document.getElementById('add-btn').textContent = '+ Add ' + pages[page].entity;
  renderContent();
}

/* ═══════════════════════════════════════
   FILTER + SORT
═══════════════════════════════════════ */
function getFilteredData() {
  let rows = [...(data[currentPage] || [])];
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    rows = rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(t)));
  }
  if (filterStatus && filterStatus !== 'all') {
    rows = rows.filter(r => String(r.status) === filterStatus);
  }
  if (sortCol) {
    rows.sort((a, b) => {
      const av = String(a[sortCol] || ''), bv = String(b[sortCol] || '');
      return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
    });
  }
  return rows;
}

function toggleSort(col) {
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  renderContent();
}

/* ═══════════════════════════════════════
   CELL RENDERING
═══════════════════════════════════════ */
function renderCellValue(row, key) {
  const v = row[key];
  if (key === 'status') {
    const m = {Active:'badge-green', Draft:'badge-amber', Inactive:'badge-gray', Connected:'badge-teal', Disconnected:'badge-red'};
    return `<span class="badge ${m[v]||'badge-gray'}">${v}</span>`;
  }
  if (key === 'isSensitive') {
    return v ? '<span class="badge badge-red">Sensitive</span>' : '<span class="badge badge-gray">Public</span>';
  }
  if (key === 'rank') return `<span style="font-weight:500;color:#185FA5">#${v}</span>`;
  if (key === 'documents' || key === 'rules') return `<span class="badge badge-blue">${v}</span>`;
  if (key === 'entityType' || key === 'type') {
    const m = {Company:'badge-purple', Account:'badge-blue', Signer:'badge-teal', Authority:'badge-amber', Other:'badge-gray'};
    return `<span class="badge ${m[v]||'badge-gray'}">${v}</span>`;
  }
  if (key === 'source') return v === 'Kyriba' ? '<span class="badge badge-purple">Kyriba</span>' : '<span class="badge badge-gray">Manual</span>';
  if (key === 'code') return `<code>${v}</code>`;
  if (!v || v === '—') return '<span style="color:var(--color-text-tertiary)">—</span>';
  return String(v);
}

/* ═══════════════════════════════════════
   SELECTION
═══════════════════════════════════════ */
function toggleRow(id, cb) {
  if (cb.checked) selectedRows.add(id); else selectedRows.delete(id);
  renderContent();
}

function selectAll(checked) {
  const rows = getFilteredData();
  if (checked === true || checked === undefined) rows.forEach(r => selectedRows.add(r.id));
  else selectedRows.clear();
  renderContent();
}

/* ═══════════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════════ */
function showCtx(e, rowId) {
  e.preventDefault();
  ctxRowId = rowId;
  const m = document.getElementById('ctx-menu');
  m.style.left = Math.min(e.clientX, window.innerWidth - 200) + 'px';
  m.style.top  = Math.min(e.clientY, window.innerHeight - 220) + 'px';
  m.classList.add('visible');
}

function ctxAction(action) {
  document.getElementById('ctx-menu').classList.remove('visible');
  if (action === 'edit')       openEditModal(ctxRowId);
  else if (action === 'delete')     confirmDelete([ctxRowId]);
  else if (action === 'duplicate')  duplicateRow(ctxRowId);
  else if (action === 'view')       showToast('👁', 'Opening detail view...');
  else if (action === 'export-row') exportRow(ctxRowId);
}

/* ═══════════════════════════════════════
   EXPORT
═══════════════════════════════════════ */
function downloadCSV(rows, name) {
  if (!rows.length) { showToast('⚠', 'No data to export'); return; }
  const keys = Object.keys(rows[0]);
  const csv  = [keys.join(','), ...rows.map(r => keys.map(k => `"${String(r[k]).replace(/"/g, '""')}"`).join(','))].join('\n');
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `${name}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 60000);
}

function exportData()     { const rows = getFilteredData(); downloadCSV(rows, currentPage); showToast('⬇', `Exported ${rows.length} records`); }
function exportSelected() { const rows = (data[currentPage]||[]).filter(r => selectedRows.has(r.id)); downloadCSV(rows, `${currentPage}_selected`); showToast('⬇', `Exported ${rows.length} records`); }
function exportRow(id)    { const row = (data[currentPage]||[]).find(r => r.id === id); if (row) { downloadCSV([row], `${currentPage}_row_${id}`); showToast('⬇', 'Row exported'); } }

═══════════════════════════════════════ */
function duplicateRow(id) {
  const arr = data[currentPage];
  const row = arr.find(r => r.id === id);
  if (!row) return;
  const newRow = {...row, id: Math.max(...arr.map(r => r.id)) + 1, name: (row.name||'') + ' (copy)', status:'Draft'};
  arr.push(newRow);
  renderContent();
  showToast('⎘', 'Record duplicated as Draft');
}

/* ═══════════════════════════════════════
   MODALS — ADD / EDIT
═══════════════════════════════════════ */
function openAddModal()    { editMode = false; editItem = null; renderModal(pages[currentPage].entity, null); }
function openEditModal(id) {
  const row = (data[currentPage]||[]).find(r => r.id === id);
  if (!row) return;
  editMode = true; editItem = row;
  renderModal(pages[currentPage].entity, row);
}

function renderModal(entity, row) {
  const isEdit = !!row;
  let fields = '';

  if (currentPage === 'request-types') {
    fields = `
      <div class="form-row"><label class="form-label">Name *</label><input class="form-input" id="f-name" value="${row?row.name:''}" placeholder="e.g. Account Opening"></div>
      <div class="form-row"><label class="form-label">Description</label><textarea class="form-input" id="f-desc" placeholder="Brief description">${row?row.description:''}</textarea></div>
      <div class="form-row"><label class="form-label">Entity Type *</label>
        <select class="form-input" id="f-entity">${['Account','Company','Signer','Authority','Other'].map(e=>`<option ${row&&row.entityType===e?'selected':''}>${e}</option>`).join('')}</select></div>
      <div class="form-row"><label class="form-label">Status</label>
        <select class="form-input" id="f-status">${['Active','Draft'].map(s=>`<option ${row&&row.status===s?'selected':''}>${s}</option>`).join('')}</select></div>`;
  } else if (currentPage === 'document-types') {
    fields = `
      <div class="form-row"><label class="form-label">Name *</label><input class="form-input" id="f-name" value="${row?row.name:''}" placeholder="e.g. Certificate of Incorporation"></div>
      <div class="form-row"><label class="form-label">Description</label><textarea class="form-input" id="f-desc">${row?row.description:''}</textarea></div>
      <div class="form-row"><label class="form-label">Category</label>
        <select class="form-input" id="f-cat">${['Certificate of Incorporation','Balance Sheet','Personal ID','Board Resolution','Account Agreement','MoA / AoA','PoA','Other'].map(c=>`<option ${row&&row.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
      <div class="form-row"><label class="form-label">Entity Type *</label>
        <select class="form-input" id="f-entity">${['Company','Account','Signer','Authority','Other'].map(e=>`<option ${row&&row.entityType===e?'selected':''}>${e}</option>`).join('')}</select></div>
      <div class="form-row"><div class="toggle-row">
        <label class="toggle"><input type="checkbox" id="f-sensitive" ${row&&row.isSensitive?'checked':''}><span class="toggle-slider"></span></label>
        <span class="toggle-label">Sensitive document (hidden from regular users)</span>
      </div></div>
      <div class="form-row"><label class="form-label">Status</label>
        <select class="form-input" id="f-status">${['Active','Draft'].map(s=>`<option ${row&&row.status===s?'selected':''}>${s}</option>`).join('')}</select></div>`;
  } else if (currentPage === 'doc-rules') {
    fields = `
      <div class="form-row"><label class="form-label">Rule Name *</label><input class="form-input" id="f-name" value="${row?row.name:''}" placeholder="e.g. EU Account Opening - Standard"></div>
      <div class="form-row"><label class="form-label">Request Type *</label>
        <select class="form-input" id="f-req">${(data['request-types']||[]).map(rt=>`<option ${row&&row.requestType===rt.name?'selected':''}>${rt.name}</option>`).join('')}</select></div>
      <div class="form-row"><label class="form-label">Rank (priority order)</label><input class="form-input" id="f-rank" type="number" min="1" value="${row?row.rank:1}"></div>
      <div class="form-row"><label class="form-label">Conditions</label><textarea class="form-input" id="f-cond" placeholder="e.g. Bank is in EU, Account Type = Checking">${row?row.conditions:''}</textarea></div>
      <div class="form-row"><label class="form-label">Status</label>
        <select class="form-input" id="f-status">${['Active','Draft'].map(s=>`<option ${row&&row.status===s?'selected':''}>${s}</option>`).join('')}</select></div>`;
  } else if (currentPage === 'doc-managers') {
    fields = `
      <div class="form-row"><label class="form-label">Manager Name *</label><input class="form-input" id="f-name" value="${row?row.name:''}" placeholder="Full name"></div>
      <div class="form-row"><label class="form-label">Email</label><input class="form-input" id="f-email" type="email" value="${row?row.email:''}" placeholder="email@company.com"></div>
      <div class="form-row"><label class="form-label">Document Types</label><input class="form-input" id="f-doctypes" value="${row?row.docTypes:''}" placeholder="e.g. Passport, Utility Bill"></div>
      <div class="form-row"><label class="form-label">Companies</label><input class="form-input" id="f-companies" value="${row?row.companies:''}" placeholder="e.g. All or EU Entities"></div>
      <div class="form-row"><label class="form-label">User Groups</label><input class="form-input" id="f-groups" value="${row?row.groups:''}" placeholder="e.g. EMEA Treasury"></div>
      <div class="form-row"><label class="form-label">Status</label>
        <select class="form-input" id="f-status">${['Active','Inactive'].map(s=>`<option ${row&&row.status===s?'selected':''}>${s}</option>`).join('')}</select></div>`;
  } else {
    fields = `
      <div class="form-row"><label class="form-label">Name *</label><input class="form-input" id="f-name" value="${row?row.name:''}" placeholder="Name"></div>
      <div class="form-row"><label class="form-label">Status</label>
        <select class="form-input" id="f-status">${['Active','Draft','Inactive'].map(s=>`<option ${row&&row.status===s?'selected':''}>${s}</option>`).join('')}</select></div>`;
  }

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">${isEdit ? 'Edit' : 'Add'} ${entity}</div>
    <div class="modal-sub">${isEdit ? 'Update the record details below.' : `Create a new ${entity.toLowerCase()} record.`}</div>
    ${fields}
    <div class="modal-footer">
      <div class="btn" onclick="closeModal('modal-overlay')">Cancel</div>
      <div class="btn btn-primary" onclick="saveModal()">Save ${entity}</div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('visible');
}

function saveModal() {
  const nameEl = document.getElementById('f-name');
  if (nameEl && !nameEl.value.trim()) { nameEl.style.borderColor = '#E24B4A'; return; }

  const arr = data[currentPage];
  if (editMode && editItem) {
    const idx = arr.findIndex(r => r.id === editItem.id);
    if (idx >= 0) {
      if (nameEl) arr[idx].name = nameEl.value.trim();
      const pick = id => { const el = document.getElementById(id); return el ? el.value : null; };
      const check = id => { const el = document.getElementById(id); return el ? el.checked : null; };
      if (pick('f-status'))    arr[idx].status     = pick('f-status');
      if (pick('f-entity'))    arr[idx].entityType = pick('f-entity');
      if (pick('f-cat'))       arr[idx].category   = pick('f-cat');
      if (check('f-sensitive') !== null) arr[idx].isSensitive = check('f-sensitive');
      if (pick('f-rank'))      arr[idx].rank        = parseInt(pick('f-rank')) || 1;
      if (pick('f-req'))       arr[idx].requestType = pick('f-req');
      if (pick('f-email'))     arr[idx].email       = pick('f-email');
      if (pick('f-doctypes'))  arr[idx].docTypes    = pick('f-doctypes');
      if (pick('f-companies')) arr[idx].companies   = pick('f-companies');
      if (pick('f-groups'))    arr[idx].groups      = pick('f-groups');
    }
    showToast('✓', `${pages[currentPage].entity} updated`);
  } else {
    const newId  = Math.max(...arr.map(r => r.id), 0) + 1;
    const newRow = {id: newId, name: nameEl ? nameEl.value.trim() : '', status: 'Active', createdAt: new Date().toISOString().slice(0, 10)};
    arr.push(newRow);
    showToast('✓', `${pages[currentPage].entity} created`);
  }
  closeModal('modal-overlay');
  renderContent();
}

/* ═══════════════════════════════════════
   DELETE
═══════════════════════════════════════ */
function confirmDelete(ids) {
  if (!ids || ids.length === 0) return;
  const entity = pages[currentPage].entity;
  document.getElementById('confirm-content').innerHTML = `
    <div class="modal-title" style="color:#A32D2D">Delete ${ids.length > 1 ? ids.length + ' records' : entity}</div>
    <div class="modal-sub">This action cannot be undone. ${ids.length > 1 ? `All ${ids.length} selected records` : 'This record'} will be permanently deleted.</div>
    ${ids.length > 1 ? `<div style="background:#FCEBEB;border-radius:6px;padding:10px 12px;font-size:13px;color:#A32D2D;margin-bottom:4px">⚠ You are about to delete <strong>${ids.length}</strong> records at once.</div>` : ''}
    <div class="modal-footer">
      <div class="btn" onclick="closeModal('confirm-overlay')">Cancel</div>
      <div class="btn btn-danger" onclick="executeDelete(${JSON.stringify(ids)})">Delete ${ids.length > 1 ? ids.length + ' Records' : entity}</div>
    </div>`;
  document.getElementById('confirm-overlay').classList.add('visible');
}

function executeDelete(ids) {
  const idSet = new Set(ids);
  data[currentPage] = (data[currentPage] || []).filter(r => !idSet.has(r.id));
  ids.forEach(id => selectedRows.delete(id));
  closeModal('confirm-overlay');
  showToast('🗑', `Deleted ${ids.length} record${ids.length > 1 ? 's' : ''}`);
  renderContent();
}

/* ═══════════════════════════════════════
   UTILITIES
═══════════════════════════════════════ */
function closeModal(id) { document.getElementById(id).classList.remove('visible'); }

function handleOverlayClick(e, id) {
  if (e.target === document.getElementById(id)) closeModal(id);
}

function showToast(icon, msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ═══════════════════════════════════════
   GLOBAL EVENTS
═══════════════════════════════════════ */
document.addEventListener('click', e => {
  if (!e.target.closest('#ctx-menu')) document.getElementById('ctx-menu').classList.remove('visible');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal('modal-overlay');
    closeModal('confirm-overlay');
    document.getElementById('ctx-menu').classList.remove('visible');
  }
});

/* ── Boot ── */
showPage('request-types');
</script>
</body>
</html>
